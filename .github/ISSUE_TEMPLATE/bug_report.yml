name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the sections below.

  - type: input
    id: command
    attributes:
      label: Command
      description: Which aspens command were you running?
      placeholder: "aspens doc init ."
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include the full error message if there is one.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Repo size, frameworks detected, anything else relevant.
